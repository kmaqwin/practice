[build]
  command = "pnpm --filter @workspace/sip-calculator... run build"
  publish = "artifacts/sip-calculator/dist"

[build.environment]
  PORT = "5000"
  BASE_PATH = "/"

[functions]
  directory = "artifacts/sip-calculator/netlify/functions"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200